 <header>

  <main class="conteudoPrincipal">
    <form id="formulario" class="formulario">
      <h2 class="mb-4">Preencha suas informações</h2>
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" class="form-control" placeholder="Nome" required>
      <label for="data">Data de nascimento:</label>
      <input type="date" id="data" name="data" placeholder="Data" class="form-control" required>

      <label for="altura">Altura (m):</label>
      <select id="altura" name="altura" placeholder="Altura" class="form-select" required>
        <option value="">Selecione</option>
        <option value="1.40">1.40</option>
        <option value="1.45">1.45m</option>
        <option value="1.50">1.50m</option>
        <option value="1.55">1.55m</option>
        <option value="1.60">1.60m</option>
        <option value="1.65">1.65m</option>
        <option value="1.70">1.70m</option>
        <option value="1.75">1.75m</option>
        <option value="1.80">1.80m</option>
        <option value="1.85">1.85m</option>
        <option value="1.90">1.90m</option>
        <option value="1.95">1.95m</option>
        <option value="2.00">2.00m</option>
        <option value="2.05">2.05m</option>
        <option value="++">++</option>
      </select>

      <label for="peso">Peso (kg):</label>
      <select id="peso" name="peso" class="form-select" placeholder="Peso" required>
        <option value="">Selecione</option>
        <option value="40">40 kg</option>
        <option value="50">50 kg</option>
        <option value="60">60 kg</option>
        <option value="70">70 kg</option>
        <option value="80">80 kg</option>
        <option value="90">90 kg</option>
        <option value="100">100 kg</option>
        <option value="110">110 kg</option>
        <option value="++">++ kg</option>
      </select>

      <label for="genero">Gênero:</label>
      <select id="genero" name="genero" placeholder="Genero" class="form-select" required>
        <option value="">Selecione</option>
        <option value="masculino">Homem</option>
        <option value="feminino">Mulher</option>
        <option value="outro">Outro</option>
      </select>
      
      <button type="button" id="btn-confirmar" class="btn btn-primary">Confirmar</button>

    

    </form>

    <div id="resultado" style="display: none;">
    
    </div>
  </main>
