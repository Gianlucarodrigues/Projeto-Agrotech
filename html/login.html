<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../styles/login.css">
  <title>Login / Cadastro</title>
  
</head>
<body>
  <div class="container">
    <h2 id="formTitle">Login</h2>

    <form id="loginForm" class="active">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Senha" required />
      <button type="submit">Entrar</button>
      <div class="toggle">
        <p>Não tem uma conta? <a onclick="toggleForms()">Cadastre-se</a></p>
      </div>
    </form>

    <form id="registerForm">
      <input type="text" placeholder="Nome" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Senha" required />
      <button type="submit">Cadastrar</button>
      <div class="toggle">
        <p>Já tem uma conta? <a onclick="toggleForms()">Fazer login</a></p>
      </div>
    </form>

    <p style="text-align: center; margin-top: 15px; color: #1db954; font-weight: 500;">
      Conectando você ao cuidado que transforma vidas 💚
    </p>
  </div>
  <script src="../js/login.js"></script>
</body>
</html>
