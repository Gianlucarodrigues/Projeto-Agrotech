<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />    
<link rel="stylesheet" href="../styles/style_contato.css">
    <title>Formulário</title>
    
</head>
<body>
    <section>
        <h2>Contato</h2>
         <div class="mb-3">
    <label for="nomeCompleto" class="form-label">Nome Completo:</label>
    <input 
      type="text" 
      class="form-control" 
      id="nomeCompleto" 
      name="nomeCompleto" 
      required 
      pattern="^(\S+\s+\S+.*)$" 
      placeholder="Ex: Nome e Sobrenome">
    <div class="invalid-feedback">
      Informe o nome completo (nome e sobrenome).
    </div>
  </div>

  <!-- E-mail -->
  <div class="mb-3">
    <label for="email" class="form-label">E-mail:</label>
    <input 
      type="email" 
      class="form-control" 
      id="email" 
      name="email" 
      required 
      placeholder="Ex: seuemail@exemplo.com">
    <div class="invalid-feedback">
      Informe um e-mail válido.
    </div>
  </div>

  <!-- Descrição da Mensagem -->
  <div class="mb-3">
    <label for="mensagem" class="form-label">Descrição da Mensagem</label>
    <textarea 
      class="form-control" 
      id="mensagem" 
      name="mensagem" 
      rows="5" 
      required 
      minlength="30" 
      maxlength="500" 
      placeholder="Digite sua mensagem (30 a 500 caracteres)"></textarea>
    <div class="invalid-feedback">
      A descrição deve ter entre 30 e 500 caracteres.
    </div>
  </div>

  <button type="submit" class="btn btn-primary"><a href="agradecimento.html">Enviar</a></button>
</form>
    </section>
</body>
</html>
